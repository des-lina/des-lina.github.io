<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magnetic geodesics on the 2-sphere, stereographic projection to the plane</title>
  <link rel="icon" type="image/png" href="logo.png">
<style>
* { box-sizing: border-box; }
body { margin: 0; overflow: hidden; background: black; display: flex; }

#left-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    border-right: 1px solid #333;
}
#right-container {
    flex: 1;
    position: relative;
    overflow: hidden;
}

.panel-label {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: #888;
    font-family: monospace;
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
}

#ui {
    position: absolute;
    top: 16px;
    right: 16px;
    color: white;
    font-family: monospace;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    padding: 12px;
    border-radius: 8px;
    min-width: 260px;
    z-index: 10;
}
#ui input[type="text"], #ui input:not([type]) {
    width: 40px;
    background: #222;
    color: white;
    border: 1px solid #555;
    border-radius: 4px;
    text-align: center;
    font-family: monospace;
}
#ui input[type="range"] {
    width: 100%;
    margin-top: 4px;
    cursor: pointer;
    accent-color: #88aaff;
}
#ui button {
    background: #444;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: monospace;
}
#ui button:hover { background: #666; }
#btnPlay { background: #2a5a2a; min-width: 70px; }
#btnPlay:hover { background: #3a7a3a; }
#btnPlay.playing { background: #5a2a2a; }
#btnPlay.playing:hover { background: #7a3a3a; }
.section { margin-top: 8px; }
.label-row { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div id="left-container">
  <div class="panel-label">Magnetic geodesic flow orbits projected to S²</div>
</div>
<div id="right-container">
  <div class="panel-label">Stereographic projection from south pole</div>
</div>

<div id="ui">
    <div style="margin-top:6px">unitary quaternion = (0,
    <input id="nb" value="0" />
    <input id="nc" value="1" />
    <input id="nd" value="0" />
  )</div>
  <div style="margin-top:6px">
    # fibers: <input id="nfibers" value="6" style="width:40px" />
  </div>
  <button id="btn" style="margin-top:8px">Update</button>

  <div class="section" style="border-top:1px solid #444; padding-top:8px; margin-top:8px;">
    <div class="label-row">
      <span>Auto-rotate</span>
      <button id="btnPlay">▶ Play</button>
    </div>
    <div style="margin-top:6px" class="label-row">
      <span>θ =</span>
      <span id="thetaDisplay">0.000</span>
      <span style="color:#888; font-size:12px">/ 2π</span>
    </div>
    <input type="range" id="thetaSlider" min="0" max="6.2832" step="0.0001" value="0" />
    <div class="label-row" style="margin-top:4px">
      <span style="color:#888; font-size:12px">Speed</span>
      <span id="speedDisplay" style="font-size:12px; color:#aaa">0.50 rad/s</span>
    </div>
    <input type="range" id="speedSlider" min="0.05" max="3.14" step="0.05" value="0.5" />
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { Line2 } from "three/addons/lines/Line2.js";
import { LineMaterial } from "three/addons/lines/LineMaterial.js";
import { LineGeometry } from "three/addons/lines/LineGeometry.js";

// ─── Helpers ────────────────────────────────────────────────────────────────

function panelSizes() {
    const h  = window.innerHeight;
    const lw = Math.floor(window.innerWidth / 2);
    const rw = window.innerWidth - lw;
    return { lw, rw, h };
}

// ─── Left renderer (S²) ─────────────────────────────────────────────────────

const leftEl = document.getElementById("left-container");
const { lw: W, h: H } = panelSizes();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
camera.position.set(0, 0, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
leftEl.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Sphere decoration
const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
scene.add(new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({
    color: 0x111111, transparent: true, opacity: 0.25, side: THREE.DoubleSide
})));
scene.add(new THREE.LineSegments(
    new THREE.WireframeGeometry(sphereGeo),
    new THREE.LineBasicMaterial({ color: 0x444444 })
));
scene.add(new THREE.AxesHelper(1.5));
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(3, 3, 3);
scene.add(dirLight);

// ─── Right renderer (Stereographic projection) ───────────────────────────────

const rightEl = document.getElementById("right-container");

const projScene = new THREE.Scene();
projScene.background = new THREE.Color(0x0d0d14);

// Orthographic camera — starts at ±3 units, user can zoom/pan
const projCamera = new THREE.OrthographicCamera(-3, 3, 3, -3, 0.1, 100);
projCamera.position.set(0, 0, 10);
projCamera.lookAt(0, 0, 0);

const { rw: RW } = panelSizes();
const projRenderer = new THREE.WebGLRenderer({ antialias: true });
projRenderer.setSize(RW, H);
projRenderer.setPixelRatio(window.devicePixelRatio);
rightEl.appendChild(projRenderer.domElement);

const projControls = new OrbitControls(projCamera, projRenderer.domElement);
projControls.enableRotate = false;   // 2D pan only
projControls.enableDamping = true;
projControls.zoomSpeed = 1.2;
projControls.screenSpacePanning = true;

// Grid (faint)
const gridHelper = new THREE.GridHelper(20, 40, 0x222233, 0x1a1a28);
gridHelper.rotation.x = Math.PI / 2;
projScene.add(gridHelper);

// Axes in projection plane
const axesMat = new THREE.LineBasicMaterial({ color: 0x555566 });
const axLine = (x1,y1,x2,y2) => {
    const g = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x1,y1,0), new THREE.Vector3(x2,y2,0)
    ]);
    return new THREE.Line(g, axesMat);
};
projScene.add(axLine(-8, 0, 8, 0));
projScene.add(axLine(0, -8, 0, 8));

// Unit circle — equator of S² maps exactly to this under south-pole projection
(function addUnitCircle() {
    const pts = [];
    for (let k = 0; k <= 128; k++) {
        const t = (k / 128) * 2 * Math.PI;
        pts.push(Math.cos(t), Math.sin(t), 0);
    }
    const geo = new LineGeometry();
    geo.setPositions(pts);
    const mat = new LineMaterial({
        color: 0x334466,
        linewidth: 1.5,
        resolution: new THREE.Vector2(W, H)
    });
    projScene.add(new Line2(geo, mat));
    // label "equator" would need CSS/HTML overlay — keep it simple
})();

// ─── Quaternion class ────────────────────────────────────────────────────────

class Q {
    constructor(a,b,c,d){ this.a=a; this.b=b; this.c=c; this.d=d; }
    mul(q){
        return new Q(
            this.a*q.a - this.b*q.b - this.c*q.c - this.d*q.d,
            this.a*q.b + this.b*q.a + this.c*q.d - this.d*q.c,
            this.a*q.c - this.b*q.d + this.c*q.a + this.d*q.b,
            this.a*q.d + this.b*q.c - this.c*q.b + this.d*q.a
        );
    }
    conj(){ return new Q(this.a, -this.b, -this.c, -this.d); }
    normalize(){
        const len = Math.sqrt(this.a**2+this.b**2+this.c**2+this.d**2);
        if (len < 1e-12) return new Q(1,0,0,0);
        return new Q(this.a/len, this.b/len, this.c/len, this.d/len);
    }
}

// ─── Hopf map ────────────────────────────────────────────────────────────────

function hopf(u){
    const i = new Q(0,1,0,0);
    const x = u.conj().mul(i).mul(u);
    return new THREE.Vector3(x.b, x.c, x.d);
}

// ─── Stereographic projection from south pole (0,0,−1) ──────────────────────
// Maps (x,y,z) on S² to (x/(1+z), y/(1+z)) in the plane

const STEREO_MAX_R = 9; // clamp radius for near-south-pole points

function stereoProject(x, y, z) {
    const denom = 1.0 + z;
    if (denom < 1e-5) {
        // Very close to south pole — clamp outward
        const angle = Math.atan2(y, x);
        return [Math.cos(angle) * STEREO_MAX_R, Math.sin(angle) * STEREO_MAX_R];
    }
    const u = x / denom;
    const v = y / denom;
    const r = Math.sqrt(u*u + v*v);
    if (r > STEREO_MAX_R) {
        return [u / r * STEREO_MAX_R, v / r * STEREO_MAX_R];
    }
    return [u, v];
}

// ─── Fiber computation ───────────────────────────────────────────────────────

function computeFiber(u0, n, steps=300) {
    const pts3D = [];
    const pts2D = [];
    for (let k = 0; k <= steps; k++) {
        const t = (k / steps) * 2 * Math.PI;
        const flow = new Q(Math.cos(t), n.b*Math.sin(t), n.c*Math.sin(t), n.d*Math.sin(t));
        const u = flow.mul(u0);
        const p = hopf(u);
        pts3D.push(p.x, p.y, p.z);
        const [pu, pv] = stereoProject(p.x, p.y, p.z);
        pts2D.push(pu, pv, 0);
    }
    return { pts3D, pts2D };
}

// ─── State ───────────────────────────────────────────────────────────────────

let currentN = new Q(0, 1, 0, 0);
let customU0  = new Q(1, 0, 0, 0);

function readUI() {
    currentN = new Q(
        0,
        parseFloat(document.getElementById("nb").value)||0,
        parseFloat(document.getElementById("nc").value)||0,
        parseFloat(document.getElementById("nd").value)||0
    ).normalize();
}

// ─── Fiber color palette ─────────────────────────────────────────────────────

const COLORS = [
    0xff4444, 0x44ff44, 0x4444ff, 0xffff44,
    0xff44ff, 0x44ffff, 0xff8844, 0x88ff44,
    0x4488ff, 0xff4488, 0x44ff88, 0x8844ff
];

function generateU0s(count) {
    return Array.from({ length: count }, (_, i) => {
        const t = (i / count) * Math.PI * 2;
        const s = (i / count) * Math.PI;
        return {
            u0: new Q(Math.cos(s), Math.sin(s)*Math.cos(t), Math.sin(s)*Math.sin(t), 0).normalize(),
            color: COLORS[i % COLORS.length]
        };
    });
}

// ─── Scene objects ───────────────────────────────────────────────────────────

let fiberLines    = [];   // Line2 in left scene
let projLines     = [];   // Line2 in right scene
let fiberMats     = [];   // LineMaterial left
let projMats      = [];   // LineMaterial right
let fiberU0s      = [];
let dots          = [];   // dots in left scene
let projDots      = [];   // dots in right scene

function clearAll() {
    fiberLines.forEach(l => { l.geometry.dispose(); scene.remove(l); });
    projLines.forEach(l  => { l.geometry.dispose(); projScene.remove(l); });
    fiberMats.forEach(m  => m.dispose());
    projMats.forEach(m   => m.dispose());
    dots.forEach(d       => { d.geometry.dispose(); scene.remove(d); });
    projDots.forEach(d   => { d.geometry.dispose(); projScene.remove(d); });
    fiberLines = []; projLines = []; fiberMats = []; projMats = [];
    fiberU0s = []; dots = []; projDots = [];
}

function makeLine2(geo, color, res) {
    const mat = new LineMaterial({ color, linewidth: 2, resolution: res.clone() });
    const line = new Line2(geo, mat);
    return { line, mat };
}

// Full rebuild
function updateFibers() {
    clearAll();

    const { lw, rw, h } = panelSizes();
    const resLeft  = new THREE.Vector2(lw, h);
    const resRight = new THREE.Vector2(rw, h);

    const count  = parseInt(document.getElementById("nfibers").value) || 6;
    const fibers = generateU0s(count);
    fibers.push({ u0: customU0, color: 0xffffff });

    fibers.forEach(f => {
        const { pts3D, pts2D } = computeFiber(f.u0, currentN);

        // Left — 3D
        const geo3 = new LineGeometry(); geo3.setPositions(pts3D);
        const { line: l3, mat: m3 } = makeLine2(geo3, f.color, resLeft);
        scene.add(l3);
        fiberLines.push(l3);
        fiberMats.push(m3);

        // Left dot
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.03, 16, 16),
            new THREE.MeshBasicMaterial({ color: f.color, depthTest: false })
        );
        dot.position.copy(hopf(f.u0));
        scene.add(dot);
        dots.push(dot);

        // Right — 2D projected
        const geo2 = new LineGeometry(); geo2.setPositions(pts2D);
        const { line: l2, mat: m2 } = makeLine2(geo2, f.color, resRight);
        projScene.add(l2);
        projLines.push(l2);
        projMats.push(m2);

        // Right dot (projected base point)
        const p = hopf(f.u0);
        const [pu, pv] = stereoProject(p.x, p.y, p.z);
        const pdot = new THREE.Mesh(
            new THREE.SphereGeometry(0.04, 16, 16),
            new THREE.MeshBasicMaterial({ color: f.color, depthTest: false })
        );
        pdot.position.set(pu, pv, 0);
        projScene.add(pdot);
        projDots.push(pdot);

        fiberU0s.push(f.u0);
    });
}

// In-place update (animation)
function updateFiberPositions() {
    fiberLines.forEach((line, i) => {
        const { pts3D, pts2D } = computeFiber(fiberU0s[i], currentN);
        line.geometry.setPositions(pts3D);
        projLines[i].geometry.setPositions(pts2D);

        // Update projected dot position
        const p = hopf(fiberU0s[i]);
        const [pu, pv] = stereoProject(p.x, p.y, p.z);
        projDots[i].position.set(pu, pv, 0);
    });
}

// ─── Animation ───────────────────────────────────────────────────────────────

let animating     = false;
let animTheta     = 0;
let lastTimestamp = null;

const thetaSlider  = document.getElementById("thetaSlider");
const thetaDisplay = document.getElementById("thetaDisplay");
const speedSlider  = document.getElementById("speedSlider");
const speedDisplay = document.getElementById("speedDisplay");
const btnPlay      = document.getElementById("btnPlay");

function setTheta(theta) {
    animTheta = ((theta % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const nb = Math.cos(animTheta);
    const nc = Math.sin(animTheta);
    currentN = new Q(0, nb, nc, 0);
    document.getElementById("nb").value = nb.toFixed(4);
    document.getElementById("nc").value = nc.toFixed(4);
    document.getElementById("nd").value = "0";
    thetaSlider.value = animTheta;
    thetaDisplay.textContent = animTheta.toFixed(3);
    updateFiberPositions();
}

btnPlay.addEventListener("click", () => {
    animating = !animating;
    lastTimestamp = null;
    btnPlay.textContent = animating ? "⏹ Stop" : "▶ Play";
    btnPlay.classList.toggle("playing", animating);
});

thetaSlider.addEventListener("input", () => {
    if (animating) { animating = false; btnPlay.textContent = "▶ Play"; btnPlay.classList.remove("playing"); }
    setTheta(parseFloat(thetaSlider.value));
});

speedSlider.addEventListener("input", () => {
    speedDisplay.textContent = parseFloat(speedSlider.value).toFixed(1) + " rad/s";
});

document.getElementById("btn").addEventListener("click", () => {
    if (animating) { animating = false; btnPlay.textContent = "▶ Play"; btnPlay.classList.remove("playing"); }
    readUI();
    updateFibers();
});

// ─── Resize ──────────────────────────────────────────────────────────────────

window.addEventListener("resize", () => {
    const { lw, rw, h } = panelSizes();

    camera.aspect = lw / h;
    camera.updateProjectionMatrix();
    renderer.setSize(lw, h);

    const vsize  = projCamera.right - projCamera.left;
    const aspect = rw / h;
    projCamera.left   = -vsize / 2;
    projCamera.right  =  vsize / 2;
    projCamera.top    =  vsize / 2 / aspect;
    projCamera.bottom = -vsize / 2 / aspect;
    projCamera.updateProjectionMatrix();
    projRenderer.setSize(rw, h);

    fiberMats.forEach(m => m.resolution.set(lw, h));
    projMats.forEach(m  => m.resolution.set(rw, h));
});

// ─── Init ────────────────────────────────────────────────────────────────────

readUI();
updateFibers();

// ─── Render loop ─────────────────────────────────────────────────────────────

function animate(timestamp) {
    requestAnimationFrame(animate);

    if (animating) {
        if (lastTimestamp === null) lastTimestamp = timestamp;
        const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
        lastTimestamp = timestamp;
        setTheta(animTheta + parseFloat(speedSlider.value) * dt);
    } else {
        lastTimestamp = null;
    }

    controls.update();
    projControls.update();
    renderer.render(scene, camera);
    projRenderer.render(projScene, projCamera);
}
animate();

</script>
</body>
</html>
